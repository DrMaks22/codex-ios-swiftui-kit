<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Codex iOS SwiftUI Kit icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.45" stop-color="#07111F"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="tealGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.62"/>
      <stop offset="0.38" stop-color="#14B8A6" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneStroke" x1="154" y1="70" x2="364" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7FFF3"/>
      <stop offset="0.55" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="layerTop" x1="155" y1="142" x2="386" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0FFFA" stop-opacity="0.96"/>
      <stop offset="0.45" stop-color="#5EEAD4" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="layerMid" x1="132" y1="201" x2="372" y2="288" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.94"/>
      <stop offset="0.52" stop-color="#14B8A6" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#1E3A8A" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="layerLow" x1="128" y1="248" x2="365" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#155E75" stop-opacity="0.62"/>
      <stop offset="0.55" stop-color="#0F766E" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#64748B" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="260" y1="278" x2="438" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.72" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="tealShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2DD4BF" flood-opacity="0.36"/>
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="94" fill="none" stroke="#243044" stroke-width="3" opacity="0.85"/>
  <circle cx="257" cy="236" r="235" fill="url(#tealGlow)" opacity="0.78"/>

  <!-- Design-system grid: tokens, rhythm and audit rails -->
  <g opacity="0.70" stroke-linecap="round">
    <path d="M87 133V334" stroke="#E2E8F0" stroke-width="2.4" opacity="0.52"/>
    <path d="M87 154H157M87 205H157M87 256H157M87 307H157" stroke="#64748B" stroke-width="2" opacity="0.55"/>
    <g fill="#CBD5E1">
      <circle cx="87" cy="133" r="5"/><circle cx="87" cy="154" r="3.6"/><circle cx="87" cy="205" r="3.6"/><circle cx="87" cy="256" r="3.6"/><circle cx="87" cy="307" r="3.6"/><circle cx="87" cy="334" r="5"/>
    </g>
    <path d="M104 154H130M104 205H145M104 256H132M104 307H150" stroke="#A7F3D0" stroke-width="2.3" opacity="0.48"/>
  </g>

  <!-- iPhone-first native surface -->
  <g filter="url(#softShadow)">
    <rect x="163" y="70" width="190" height="346" rx="46" fill="#05101D" fill-opacity="0.50"/>
    <rect x="163" y="70" width="190" height="346" rx="46" fill="none" stroke="url(#phoneStroke)" stroke-width="10"/>
    <path d="M229 92H289" stroke="#9FFFF1" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
    <path d="M234 389H286" stroke="#2DD4BF" stroke-width="8" stroke-linecap="round" opacity="0.86"/>
  </g>

  <!-- SwiftUI layers: composition, hierarchy and implementation -->
  <g filter="url(#tealShadow)" stroke-linejoin="round">
    <path d="M175 190L313 128C320 125 325 125 331 128L400 161C410 166 410 178 400 183L260 249C252 253 247 253 239 249L175 219C163 214 163 195 175 190Z" fill="url(#layerTop)" stroke="#D7FFFA" stroke-width="4.5"/>
    <path d="M151 243L292 178C299 175 305 175 312 178L382 211C393 216 393 230 382 235L238 302C230 306 224 306 216 302L151 271C139 265 139 248 151 243Z" fill="url(#layerMid)" stroke="#5EEAD4" stroke-width="3.5" opacity="0.96"/>
    <path d="M143 295L278 234C286 230 292 230 300 234L366 264C376 269 376 282 366 287L226 352C219 355 213 355 206 352L143 323C131 317 131 300 143 295Z" fill="url(#layerLow)" stroke="#334155" stroke-width="3.5" opacity="0.90"/>
  </g>

  <!-- Original Swift-like flow mark; not an official logo -->
  <g filter="url(#softShadow)">
    <path d="M293 304C327 326 365 318 407 279C398 324 371 356 333 365C358 382 390 388 426 383C382 421 320 416 278 374C305 379 327 375 345 363C303 354 268 326 246 286C268 303 289 314 311 318C298 309 287 298 278 284C306 304 329 316 348 318C330 301 317 284 307 266C335 293 360 306 383 305C352 328 324 328 293 304Z" fill="url(#swoosh)" opacity="0.96"/>
  </g>

  <!-- Tiny quality-gate check -->
  <g transform="translate(374 363)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="31" fill="#07111F" stroke="#2DD4BF" stroke-width="5"/>
    <path d="M-13 0L-3 10L16 -13" fill="none" stroke="#8CFFF1" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
